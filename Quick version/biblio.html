```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Escolar - Sistema de Préstamos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .modal-backdrop { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .scan-input:focus { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3); border-color: #3b82f6; }
        .status-disponible { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-prestado { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .status-vencido { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // ============================================================================
        // DATA LAYER - localStorage
        // ============================================================================
        const STORAGE = {
            BOOKS: 'bib_books',
            STUDENTS: 'bib_students',
            LOANS: 'bib_loans'
        };

        const Storage = {
            get(key, def = []) {
                try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : def; } catch { return def; }
            },
            set(key, val) {
                try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.error(e); }
            }
        };

        // Seed mock data
        function seedData() {
            if (!Storage.get(STORAGE.BOOKS)) {
                Storage.set(STORAGE.BOOKS, [
                    { id: 'LIB001', codigo: '978-0316769488', titulo: 'El principito', autor: 'Antoine de Saint-Exupéry', editorial: 'HarperCollins', estado: 'prestado' },
                    { id: 'LIB002', codigo: '978-0451524935', titulo: 'Cien años de soledad', autor: 'Gabriel García Márquez', editorial: 'Penguin', estado: 'disponible' },
                    { id: 'LIB003', codigo: '978-8437604947', titulo: 'Don Quijote de la Mancha', autor: 'Miguel de Cervantes', editorial: 'Castalia', estado: 'vencido' },
                    { id: 'LIB004', codigo: '978-0307474278', titulo: 'Rayuela', autor: 'Julio Cortázar', editorial: 'Vintage', estado: 'disponible' },
                    { id: 'LIB005', codigo: '978-0307744432', titulo: 'La sombra del viento', autor: 'Carlos Ruiz Zafón', editorial: 'Penguin', estado: 'prestado' },
                ]);
            }
            if (!Storage.get(STORAGE.STUDENTS)) {
                Storage.set(STORAGE.STUDENTS, [
                    { id: 'EST001', nombre: 'Sofía Martínez Ruiz', grado: '3° Primaria', matricula: '2024001' },
                    { id: 'EST002', nombre: 'Diego Hernández Vega', grado: '5° Primaria', matricula: '2024002' },
                    { id: 'EST003', nombre: 'María Fernanda Torres', grado: '1° Secundaria', matricula: '2024003' },
                ]);
            }
            if (!Storage.get(STORAGE.LOANS)) {
                const today = new Date();
                const pastDate = new Date();
                pastDate.setDate(today.getDate() - 10);
                const futureDate = new Date();
                futureDate.setDate(today.getDate() + 2);
                const activeDate = new Date();
                activeDate.setDate(today.getDate() + 5);

                Storage.set(STORAGE.LOANS, [
                    { id: 'PRE001', libroId: 'LIB003', estudianteId: 'EST001', fechaPrestamo: pastDate.toISOString(), fechaEntrega: pastDate.toISOString(), fechaDevolucion: null, estado: 'vencido' },
                    { id: 'PRE002', libroId: 'LIB001', estudianteId: 'EST002', fechaPrestamo: futureDate.toISOString(), fechaEntrega: futureDate.toISOString(), fechaDevolucion: null, estado: 'prestado' },
                    { id: 'PRE003', libroId: 'LIB005', estudianteId: 'EST003', fechaPrestamo: activeDate.toISOString(), fechaEntrega: activeDate.toISOString(), fechaDevolucion: null, estado: 'prestado' },
                ]);
            }
        }
        seedData();

        // ============================================================================
        // UTILITY FUNCTIONS
        // ============================================================================
        const formatDate = (iso) => { if (!iso) return '-'; return new Date(iso).toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' }); };
        const daysDiff = (dateStr) => { const d = new Date(dateStr); const today = new Date(); today.setHours(0,0,0,0); return Math.ceil((today - d) / (1000 * 60 * 60 * 24)); };
        const addDays = (date, days) => { const d = new Date(date); d.setDate(d.getDate() + days); return d.toISOString().split('T')[0]; };

        // ============================================================================
        // COMPONENTS
        // ============================================================================

        function Header({ currentView, setView, onScanFocus }) {
            return (
                <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm sticky top-0 z-20">
                    <div className="flex items-center space-x-4">
                        <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center">
                            <i className="fas fa-book-open text-white text-xl"></i>
                        </div>
                        <div>
                            <h1 className="text-xl font-bold text-slate-800">Biblioteca Escolar</h1>
                            <p className="text-xs text-slate-500">Sistema de Préstamos y Catalogación</p>
                        </div>
                    </div>
                    <nav className="flex space-x-1 bg-slate-100 p-1 rounded-lg">
                        {[{ id: 'dashboard', label: 'Panel', icon: 'fas fa-chart-pie' }, { id: 'catalogo', label: 'Catálogo', icon: 'fas fa-list' }].map(item => (
                            <button key={item.id} onClick={() => setView(item.id)} className={`px-4 py-2 rounded-md text-sm font-medium transition-all ${currentView === item.id ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600 hover:text-slate-800'}`}>
                                <i className={`${item.icon} mr-2`}></i>{item.label}
                            </button>
                        ))}
                    </nav>
                </header>
            );
        }

        function ScannerInput({ books, setBooks, loans, setLoans, students }) {
            const inputRef = useRef(null);
            const [showModal, setShowModal] = useState(false);
            const [pendingBook, setPendingBook] = useState(null);
            const [form, setForm] = useState({ studentId: '', fecha: '' });
            const [notification, setNotification] = useState(null);
            const [showAddBook, setShowAddBook] = useState(false);
            const [newBookCode, setNewBookCode] = useState('');
            const [addForm, setAddForm] = useState({ titulo: '', autor: '', editorial: '' });

            // Auto focus scanner input
            useEffect(() => {
                const timer = setTimeout(() => inputRef.current?.focus(), 100);
                const focusHandler = () => inputRef.current?.focus();
                window.addEventListener('click', focusHandler);
                return () => { clearTimeout(timer); window.removeEventListener('click', focusHandler); };
            }, []);

            const showNotif = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleScan = (e) => {
                if (e.key === 'Enter') {
                    const code = e.target.value.trim();
                    e.target.value = '';
                    
                    if (!code) return;

                    const book = books.find(b => b.codigo === code || b.id === code);

                    if (!book) {
                        setNewBookCode(code);
                        setShowAddBook(true);
                        return;
                    }

                    if (book.estado === 'disponible') {
                        setPendingBook(book);
                        setForm({ studentId: '', fecha: addDays(new Date(), 7) });
                        setShowModal(true);
                    } else {
                        // Mark as returned
                        const updatedBooks = books.map(b => b.id === book.id ? { ...b, estado: 'disponible' } : b);
                        const updatedLoans = loans.map(l => l.libroId === book.id && !l.fechaDevolucion ? { ...l, fechaDevolucion: new Date().toISOString(), estado: 'devuelto' } : l);
                        setBooks(updatedBooks);
                        setLoans(updatedLoans);
                        showNotif(`✅ "${book.titulo}" marcado como Devuelto`, 'success');
                    }
                }
            };

            const handleLend = () => {
                if (!form.studentId) return alert('Selecciona un estudiante');
                const newLoanId = `PRE${String(loans.length + 1).padStart(3, '0')}`;
                const updatedBooks = books.map(b => b.id === pendingBook.id ? { ...b, estado: 'prestado' } : b);
                const updatedLoans = [...loans, { id: newLoanId, libroId: pendingBook.id, estudianteId: form.studentId, fechaPrestamo: new Date().toISOString(), fechaEntrega: new Date(form.fecha).toISOString(), fechaDevolucion: null, estado: 'prestado' }];
                setBooks(updatedBooks);
                setLoans(updatedLoans);
                setShowModal(false);
                showNotif(`📖 "${pendingBook.titulo}" prestado exitosamente`, 'success');
            };

            const handleAddBook = () => {
                if (!addForm.titulo || !addForm.autor) return alert('Completa título y autor');
                const newId = `LIB${String(books.length + 1).padStart(3, '0')}`;
                setBooks([...books, { id: newId, codigo: newBookCode, ...addForm, estado: 'disponible' }]);
                setShowAddBook(false);
                setAddForm({ titulo: '', autor: '', editorial: '' });
                showNotif('📚 Libro agregado al catálogo', 'success');
                inputRef.current?.focus();
            };

            return (
                <div className="bg-white rounded-xl border border-slate-200 p-5 shadow-sm mb-6 relative">
                    <div className="flex items-center space-x-4">
                        <div className="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600">
                            <i className="fas fa-barcode text-xl"></i>
                        </div>
                        <div className="flex-1">
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Escanear Código (ISBN) o ID</label>
                            <input ref={inputRef} type="text" onKeyDown={handleScan} className="scan-input w-full px-4 py-3 text-lg font-mono border-2 border-slate-200 rounded-lg outline-none transition-all" placeholder="Escanea o escribe el código y presiona Enter..." />
                        </div>
                        <div className="text-center hidden md:block">
                            <p className="text-xs text-slate-400 mb-1">Acción automática</p>
                            <span className="inline-flex items-center px-3 py-1 bg-slate-100 rounded-full text-xs font-medium text-slate-600">Enter ↵</span>
                        </div>
                    </div>
                    {notification && <div className={`mt-4 p-3 rounded-lg text-sm font-medium ${notification.type === 'success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-red-50 text-red-700 border border-red-200'}`}>{notification.msg}</div>}

                    {/* Lend Modal */}
                    {showModal && pendingBook && (
                        <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4 fade-in">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between bg-blue-50 rounded-t-2xl">
                                    <h3 className="text-lg font-bold text-slate-800"><i className="fas fa-hand-holding-book mr-2 text-blue-600"></i>Préstamo de Libro</h3>
                                    <button onClick={() => setShowModal(false)} className="text-slate-400 hover:text-slate-600"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                        <p className="font-semibold text-slate-800">{pendingBook.titulo}</p>
                                        <p className="text-sm text-slate-500">{pendingBook.autor}</p>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Estudiante</label>
                                        <select className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white" value={form.studentId} onChange={e => setForm({...form, studentId: e.target.value})}>
                                            <option value="">Seleccionar estudiante...</option>
                                            {students.map(s => <option key={s.id} value={s.id}>{s.nombre} ({s.matricula})</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Fecha de Entrega</label>
                                        <input type="date" className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={form.fecha} onChange={e => setForm({...form, fecha: e.target.value})} />
                                    </div>
                                    <button onClick={handleLend} className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition-colors"><i className="fas fa-check mr-2"></i>Confirmar Préstamo</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Book Modal */}
                    {showAddBook && (
                        <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4 fade-in">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between bg-amber-50 rounded-t-2xl">
                                    <h3 className="text-lg font-bold text-slate-800"><i className="fas fa-book-medical mr-2 text-amber-600"></i>Agregar al Catálogo</h3>
                                    <button onClick={() => setShowAddBook(false)} className="text-slate-400 hover:text-slate-600"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 font-mono text-sm text-slate-600">Código: {newBookCode}</div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Título</label><input className="w-full px-3 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" value={addForm.titulo} onChange={e => setAddForm({...addForm, titulo: e.target.value})} /></div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Autor</label><input className="w-full px-3 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" value={addForm.autor} onChange={e => setAddForm({...addForm, autor: e.target.value})} /></div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Editorial</label><input className="w-full px-3 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" value={addForm.editorial} onChange={e => setAddForm({...addForm, editorial: e.target.value})} /></div>
                                    <button onClick={handleAddBook} className="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-semibold transition-colors"><i className="fas fa-plus mr-2"></i>Agregar Libro</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Dashboard({ books, loans, students }) {
            const activeLoans = loans.filter(l => !l.fechaDevolucion);
            const overdueLoans = activeLoans.map(l => ({ ...l, daysOverdue: daysDiff(l.fechaEntrega) })).filter(l => l.daysOverdue > 0);

            const getBookInfo = (id) => books.find(b => b.id === id) || {};
            const getStudentInfo = (id) => students.find(s => s.id === id) || {};

            return (
                <div className="space-y-6 fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                        {[
                            { title: 'Total de Libros', value: books.length, icon: 'fas fa-book', color: 'blue' },
                            { title: 'Libros Prestados', value: activeLoans.length, icon: 'fas fa-hand-holding-book', color: 'amber' },
                            { title: 'Préstamos Vencidos', value: overdueLoans.length, icon: 'fas fa-exclamation-triangle', color: 'red' }
                        ].map((m, i) => (
                            <div key={i} className="bg-white rounded-xl p-6 border border-slate-200 shadow-sm">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-sm font-medium text-slate-500">{m.title}</p>
                                        <p className={`text-3xl font-bold mt-2 font-mono ${m.color === 'red' ? 'text-red-600' : m.color === 'amber' ? 'text-amber-600' : 'text-blue-600'}`}>{m.value}</p>
                                    </div>
                                    <div className={`w-14 h-14 rounded-xl flex items-center justify-center ${m.color === 'blue' ? 'bg-blue-100 text-blue-600' : m.color === 'amber' ? 'bg-amber-100 text-amber-600' : 'bg-red-100 text-red-600'}`}>
                                        <i className={`${m.icon} text-2xl`}></i>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {overdueLoans.length > 0 && (
                        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                            <div className="px-6 py-4 bg-red-50 border-b border-red-100 flex items-center space-x-3">
                                <i className="fas fa-exclamation-circle text-red-600 text-xl"></i>
                                <h3 className="text-lg font-bold text-red-800">Préstamos Vencidos</h3>
                            </div>
                            <div className="divide-y divide-slate-100">
                                {overdueLoans.map(loan => {
                                    const book = getBookInfo(loan.libroId);
                                    const student = getStudentInfo(loan.estudianteId);
                                    return (
                                        <div key={loan.id} className="px-6 py-4 flex items-center justify-between hover:bg-red-50/50 transition-colors">
                                            <div className="flex items-center space-x-4">
                                                <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center text-red-600">
                                                    <i className="fas fa-book"></i>
                                                </div>
                                                <div>
                                                    <p className="font-semibold text-slate-800">{book.titulo || 'Desconocido'}</p>
                                                    <p className="text-sm text-slate-500">Préstamo a: <span className="font-medium text-slate-700">{student.nombre || 'Desconocido'}</span> ({student.grado || ''})</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <div className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-sm font-bold border border-red-200">{loan.daysOverdue} días de retraso</div>
                                                <p className="text-xs text-slate-400 mt-1">Entrega: {formatDate(loan.fechaEntrega)}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {overdueLoans.length === 0 && (
                        <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-8 text-center">
                            <i className="fas fa-check-circle text-emerald-500 text-4xl mb-3"></i>
                            <p className="text-emerald-800 font-semibold text-lg">¡No hay préstamos vencidos!</p>
                            <p className="text-emerald-600 text-sm">Todos los libros están en orden o han sido devueltos a tiempo.</p>
                        </div>
                    )}
                </div>
            );
        }

        function Catalogo({ books, setBooks, students }) {
            const [search, setSearch] = useState('');
            const [showAdd, setShowAdd] = useState(false);
            const [form, setForm] = useState({ codigo: '', titulo: '', autor: '', editorial: '' });

            const filtered = books.filter(b => b.titulo.toLowerCase().includes(search.toLowerCase()) || b.autor.toLowerCase().includes(search.toLowerCase()) || b.codigo.toLowerCase().includes(search.toLowerCase()) || b.id.toLowerCase().includes(search.toLowerCase()));

            const handleAdd = () => {
                if (!form.codigo || !form.titulo) return alert('Código y título son obligatorios');
                if (books.find(b => b.codigo === form.codigo)) return alert('Ese código ya existe');
                const newId = `LIB${String(books.length + 1).padStart(3, '0')}`;
                setBooks([...books, { id: newId, ...form, estado: 'disponible' }]);
                setShowAdd(false);
                setForm({ codigo: '', titulo: '', autor: '', editorial: '' });
            };

            return (
                <div className="space-y-6 fade-in">
                    <div className="flex items-center justify-between">
                        <div className="relative flex-1 max-w-md">
                            <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="text" placeholder="Buscar por título, autor, código..." className="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" value={search} onChange={e => setSearch(e.target.value)} />
                        </div>
                        <button onClick={() => setShowAdd(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium shadow-sm transition-colors flex items-center space-x-2">
                            <i className="fas fa-plus"></i><span>Agregar Libro</span>
                        </button>
                    </div>

                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-slate-50">
                                <tr>
                                    <th className="text-left py-3 px-4 text-xs font-semibold text-slate-500 uppercase">ID</th>
                                    <th className="text-left py-3 px-4 text-xs font-semibold text-slate-500 uppercase">Título</th>
                                    <th className="text-left py-3 px-4 text-xs font-semibold text-slate-500 uppercase hidden md:table-cell">Autor</th>
                                    <th className="text-left py-3 px-4 text-xs font-semibold text-slate-500 uppercase hidden lg:table-cell">Editorial</th>
                                    <th className="text-center py-3 px-4 text-xs font-semibold text-slate-500 uppercase">Estado</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filtered.map(book => (
                                    <tr key={book.id} className="hover:bg-slate-50 transition-colors">
                                        <td className="py-3 px-4 font-mono text-sm text-slate-600">{book.id}</td>
                                        <td className="py-3 px-4">
                                            <div className="font-medium text-slate-800">{book.titulo}</div>
                                            <div className="text-xs text-slate-500 font-mono">{book.codigo}</div>
                                        </td>
                                        <td className="py-3 px-4 text-sm text-slate-600 hidden md:table-cell">{book.autor}</td>
                                        <td className="py-3 px-4 text-sm text-slate-600 hidden lg:table-cell">{book.editorial || '-'}</td>
                                        <td className="py-3 px-4 text-center">
                                            {book.estado === 'disponible' ? (
                                                <span className="status-disponible inline-flex items-center px-3 py-1 rounded-full text-xs font-bold">Disponible</span>
                                            ) : book.estado === 'prestado' ? (
                                                <span className="status-prestado inline-flex items-center px-3 py-1 rounded-full text-xs font-bold">Prestado</span>
                                            ) : (
                                                <span className="status-vencido inline-flex items-center px-3 py-1 rounded-full text-xs font-bold">Vencido</span>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filtered.length === 0 && <div className="p-12 text-center text-slate-400"><i className="fas fa-search text-3xl mb-3"></i><p>No se encontraron libros</p></div>}
                    </div>

                    {showAdd && (
                        <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4 fade-in">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="px-6 py-4 border-b border-slate-200 flex items-center justify-between bg-blue-50 rounded-t-2xl">
                                    <h3 className="text-lg font-bold text-slate-800"><i className="fas fa-book-medical mr-2 text-blue-600"></i>Agregar Nuevo Libro</h3>
                                    <button onClick={() => setShowAdd(false)} className="text-slate-400 hover:text-slate-600"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Código / ISBN *</label><input className="w-full px-3 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 font-mono" value={form.codigo} onChange={e => setForm({...form, codigo: e.target.value})} placeholder="978-..." /></div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Título *</label><input className="w-full px-3 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" value={form.titulo} onChange={e => setForm({...form, titulo: e.target.value})} /></div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Autor</label><input className="w-full px-3 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" value={form.autor} onChange={e => setForm({...form, autor: e.target.value})} /></div>
                                    <div><label className="block text-sm font-medium text-slate-700 mb-1">Editorial</label><input className="w-full px-3 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" value={form.editorial} onChange={e => setForm({...form, editorial: e.target.value})} /></div>
                                    <button onClick={handleAdd} className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition-colors"><i className="fas fa-save mr-2"></i>Guardar Libro</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ============================================================================
        // MAIN APP
        // ============================================================================
        function App() {
            const [view, setView] = useState('dashboard');
            const [books, setBooks] = useState(Storage.get(STORAGE.BOOKS, []));
            const [loans, setLoans] = useState(Storage.get(STORAGE.LOANS, []));
            const [students] = useState(Storage.get(STORAGE.STUDENTS, []));

            useEffect(() => { Storage.set(STORAGE.BOOKS, books); }, [books]);
            useEffect(() => { Storage.set(STORAGE.LOANS, loans); }, [loans]);

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <Header currentView={view} setView={setView} />
                    <main className="flex-1 p-6 max-w-7xl w-full mx-auto">
                        {view === 'dashboard' && (
                            <>
                                <ScannerInput books={books} setBooks={setBooks} loans={loans} setLoans={setLoans} students={students} />
                                <Dashboard books={books} loans={loans} students={students} />
                            </>
                        )}
                        {view === 'catalogo' && <Catalogo books={books} setBooks={setBooks} students={students} />}
                    </main>
                    <footer className="bg-white border-t border-slate-200 py-4 text-center text-xs text-slate-400">
                        Sistema de Biblioteca Escolar v1.0 • Datos almacenados localmente • Sin conexión a internet
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
