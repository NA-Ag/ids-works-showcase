```html
<!DOCTYPE html>
<html lang="es">
<head>

    <style>

    </style>

    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ============================================================================
        // DATA LAYER
        // ============================================================================
        const STORAGE = {
            SLIDES: 'tv_slides',
            TICKER: 'tv_ticker'
        };

        const Storage = {
            get(key, def = null) {
                try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : def; } catch { return def; }
            },
            set(key, val) {
                try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.error(e); }
            }
        };

        // Seed mock data
        function seedData() {
            if (!Storage.get(STORAGE.SLIDES)) {
                Storage.set(STORAGE.SLIDES, [
                    {
                        id: '1',
                        titulo: '🏆 Cuadro de Honor',
                        mensaje: 'Felicidades a nuestros alumnos destacados del bimestre por su excelencia académica, disciplina y valores.',
                        tipo: 'honor',
                        creado: new Date().toISOString()
                    },
                    {
                        id: '2',
                        titulo: '📢 Aviso General',
                        mensaje: 'Se convoca a los padres de familia a la Junta Informativa del mes. Lunes 24 en el auditorio principal a las 17:00 hrs.',
                        tipo: 'aviso',
                        creado: new Date().toISOString()
                    },
                    {
                        id: '3',
                        titulo: '🎉 Próximo Evento',
                        mensaje: 'Festival de Primavera: Viernes 28 de Marzo. ¡Los esperamos con gusto! No olviden traer su invitación.',
                        tipo: 'evento',
                        creado: new Date().toISOString()
                    }
                ]);
            }
            if (!Storage.get(STORAGE.TICKER)) {
                Storage.set(STORAGE.TICKER, '★ Bienvenidos al Colegio ★ Recuerden que la inscripción al nuevo ciclo escolar está abierta ★ Consulta nuestra plataforma en línea ★ ¡Juntos construimos el futuro de nuestros hijos! ★ Horario de atención en administración: 8:00 a 15:00 hrs ★');
            }
        }
        seedData();

        // ============================================================================
        // CLOCK COMPONENT
        // ============================================================================
        function LiveClock() {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            
            const timeStr = time.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const dateStr = time.toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            return (
                <div className="text-right">
                    <div className="text-6xl font-black text-white clock-glow tracking-tight font-mono">{timeStr}</div>
                    <div className="text-xl text-blue-200 mt-1 capitalize font-medium">{dateStr}</div>
                </div>
            );
        }

        // ============================================================================
        // TICKER COMPONENT
        // ============================================================================
        function Ticker({ text }) {
            const displayText = text + '     •     ' + text + '     •     ';
            return (
                <div className="w-full bg-slate-900/90 border-t border-blue-500/30 py-4 overflow-hidden">
                    <div className="ticker-wrap">
                        <div className="ticker-move text-3xl font-bold text-yellow-400">
                            <span>{displayText}</span>
                            <span className="ml-4">{displayText}</span>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // KIOSK MODE
        // ============================================================================
        function KioskMode({ slides, tickerText, onExit }) {
            const [currentSlide, setCurrentSlide] = useState(0);
            const slideInterval = useRef(null);

            useEffect(() => {
                if (slides.length > 1) {
                    slideInterval.current = setInterval(() => {
                        setCurrentSlide(prev => (prev + 1) % slides.length);
                    }, 5000);
                }
                return () => { if (slideInterval.current) clearInterval(slideInterval.current); };
            }, [slides.length]);

            if (slides.length === 0) {
                return (
                    <div className="h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center">
                        <div className="text-center text-white">
                            <i className="fas fa-tv text-8xl mb-6 text-slate-600"></i>
                            <h1 className="text-5xl font-bold mb-4">No hay contenido disponible</h1>
                            <button onClick={onExit} className="mt-6 bg-white/10 hover:bg-white/20 px-8 py-3 rounded-lg text-xl transition-colors">Salir del Kiosco</button>
                        </div>
                    </div>
                );
            }

            const slide = slides[currentSlide];
            
            const bgColors = {
                honor: 'from-blue-600 via-blue-800 to-indigo-900',
                aviso: 'from-amber-600 via-orange-700 to-red-800',
                evento: 'from-emerald-600 via-teal-700 to-cyan-900'
            };

            const accentColors = {
                honor: 'text-blue-300',
                aviso: 'text-amber-300',
                evento: 'text-emerald-300'
            };

            return (
                <div className="h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex flex-col relative overflow-hidden">
                    {/* Hidden Exit Button */}
                    <button onClick={onExit} className="hidden-exit bg-red-600/80 hover:bg-red-600 rounded-lg flex items-center justify-center text-white" title="Salir">
                        <i className="fas fa-sign-out-alt text-2xl"></i>
                    </button>

                    {/* Header */}
                    <header className="px-12 py-8 flex items-center justify-between bg-gradient-to-b from-black/40 to-transparent">
                        <div className="flex items-center space-x-4">
                            <div className="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-2xl">
                                <i className="fas fa-school text-white text-3xl"></i>
                            </div>
                            <div>
                                <h1 className="text-4xl font-black text-white tracking-wide">COLEGIO INTERNACIONAL</h1>
                                <p className="text-xl text-blue-300 font-medium tracking-widest uppercase">Pantalla Informativa</p>
                            </div>
                        </div>
                        <div className="flex items-center space-x-3 bg-white/5 px-6 py-3 rounded-xl border border-white/10">
                            <div className="w-3 h-3 bg-red-500 rounded-full pulse-dot"></div>
                            <span className="text-red-400 font-semibold tracking-wider">EN VIVO</span>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 flex items-center justify-center px-16 py-8">
                        <div key={slide.id} className="slide-enter w-full max-w-7xl">
                            <div className={`bg-gradient-to-br ${bgColors[slide.tipo] || bgColors.aviso} rounded-3xl p-16 shadow-2xl border border-white/10 relative overflow-hidden`}>
                                {/* Background Pattern */}
                                <div className="absolute inset-0 opacity-10">
                                    <div className="absolute top-0 right-0 w-96 h-96 bg-white rounded-full -mr-48 -mt-48 blur-3xl"></div>
                                    <div className="absolute bottom-0 left-0 w-72 h-72 bg-white rounded-full -ml-36 -mb-36 blur-3xl"></div>
                                </div>
                                
                                <div className="relative z-10">
                                    <div className="flex items-center space-x-4 mb-8">
                                        <div className={`px-6 py-2 bg-white/10 rounded-full ${accentColors[slide.tipo]} text-lg font-bold uppercase tracking-wider`}>
                                            {slide.tipo === 'honor' ? '🏆 Cuadro de Honor' : slide.tipo === 'aviso' ? '📢 Aviso Importante' : '🎉 Próximo Evento'}
                                        </div>
                                    </div>
                                    
                                    <h2 className="text-7xl font-black text-white mb-8 leading-tight drop-shadow-lg">
                                        {slide.titulo}
                                    </h2>
                                    
                                    <p className="text-4xl text-white/90 leading-relaxed font-medium max-w-5xl">
                                        {slide.mensaje}
                                    </p>
                                    
                                    {/* Slide Indicators */}
                                    <div className="flex items-center space-x-3 mt-12">
                                        {slides.map((s, i) => (
                                            <div key={s.id} className={`h-2 rounded-full transition-all duration-500 ${i === currentSlide ? 'w-12 bg-white' : 'w-4 bg-white/30'}`}></div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Footer / Ticker */}
                    <Ticker text={tickerText} />
                </div>
            );
        }

        // ============================================================================
        // ADMIN PANEL
        // ============================================================================
        function AdminPanel({ slides, setSlides, tickerText, setTickerText, onBack }) {
            const [form, setForm] = useState({ titulo: '', mensaje: '', tipo: 'aviso' });

            const addSlide = () => {
                if (!form.titulo.trim() || !form.mensaje.trim()) {
                    alert('Por favor completa el título y el mensaje.');
                    return;
                }
                const newSlide = {
                    id: Date.now().toString(),
                    titulo: form.titulo,
                    mensaje: form.mensaje,
                    tipo: form.tipo,
                    creado: new Date().toISOString()
                };
                setSlides([...slides, newSlide]);
                setForm({ titulo: '', mensaje: '', tipo: 'aviso' });
            };

            const deleteSlide = (id) => {
                setSlides(slides.filter(s => s.id !== id));
            };

            const updateTicker = (val) => {
                setTickerText(val);
            };

            const tipoColors = {
                honor: 'bg-blue-500/20 text-blue-300 border-blue-500/30',
                aviso: 'bg-amber-500/20 text-amber-300 border-amber-500/30',
                evento: 'bg-emerald-500/20 text-emerald-300 border-emerald-500/30'
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white p-8 overflow-y-auto">
                    <div className="max-w-6xl mx-auto space-y-8 fade-in">
                        {/* Header */}
                        <div className="flex items-center justify-between mb-8">
                            <div className="flex items-center space-x-4">
                                <div className="w-14 h-14 bg-blue-600 rounded-xl flex items-center justify-center">
                                    <i className="fas fa-cog text-white text-2xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-4xl font-black">Panel de Administración</h1>
                                    <p className="text-slate-400 text-lg">Gestiona el contenido de las pantallas</p>
                                </div>
                            </div>
                            <button onClick={onBack} className="bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-xl font-semibold transition-colors flex items-center space-x-2 border border-slate-600">
                                <i className="fas fa-arrow-left"></i>
                                <span>Volver al Inicio</span>
                            </button>
                        </div>

                        {/* Add Slide Form */}
                        <div className="admin-card rounded-2xl p-8 border border-slate-700 shadow-2xl">
                            <h2 className="text-2xl font-bold mb-6 flex items-center">
                                <i className="fas fa-plus-circle mr-3 text-blue-400"></i>
                                Agregar Nueva Diapositiva
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-300 mb-2">Título</label>
                                    <input type="text" className="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-white" placeholder="Ej: 🏆 Cuadro de Honor" value={form.titulo} onChange={e => setForm({...form, titulo: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-300 mb-2">Tipo de Slide</label>
                                    <select className="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-white" value={form.tipo} onChange={e => setForm({...form, tipo: e.target.value})}>
                                        <option value="aviso">📢 Aviso General</option>
                                        <option value="honor">🏆 Cuadro de Honor</option>
                                        <option value="evento">🎉 Próximo Evento</option>
                                    </select>
                                </div>
                                <div className="flex items-end">
                                    <button onClick={addSlide} className="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition-colors flex items-center justify-center space-x-2">
                                        <i className="fas fa-plus"></i>
                                        <span>Agregar Slide</span>
                                    </button>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-300 mb-2">Mensaje</label>
                                <textarea className="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-white resize-none" rows="3" placeholder="Escribe el contenido del mensaje..." value={form.mensaje} onChange={e => setForm({...form, mensaje: e.target.value})}></textarea>
                            </div>
                        </div>

                        {/* Active Slides */}
                        <div className="admin-card rounded-2xl p-8 border border-slate-700 shadow-2xl">
                            <h2 className="text-2xl font-bold mb-6 flex items-center">
                                <i className="fas fa-images mr-3 text-purple-400"></i>
                                Diapositivas Activas ({slides.length})
                            </h2>
                            {slides.length === 0 ? (
                                <p className="text-slate-500 text-center py-8">No hay diapositivas configuradas.</p>
                            ) : (
                                <div className="space-y-3">
                                    {slides.map(slide => (
                                        <div key={slide.id} className="bg-slate-800/50 rounded-xl p-5 border border-slate-700/50 flex items-center justify-between group hover:border-slate-600 transition-colors">
                                            <div className="flex-1">
                                                <div className="flex items-center space-x-3 mb-2">
                                                    <span className={`px-3 py-1 rounded-lg text-sm font-bold border ${tipoColors[slide.tipo]}`}>
                                                        {slide.tipo.toUpperCase()}
                                                    </span>
                                                    <h3 className="font-bold text-lg text-white">{slide.titulo}</h3>
                                                </div>
                                                <p className="text-slate-400 text-base">{slide.mensaje}</p>
                                            </div>
                                            <button onClick={() => deleteSlide(slide.id)} className="ml-4 bg-red-500/20 hover:bg-red-500/40 text-red-400 px-4 py-2 rounded-lg transition-colors opacity-60 group-hover:opacity-100">
                                                <i className="fas fa-trash-alt"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Ticker Text */}
                        <div className="admin-card rounded-2xl p-8 border border-slate-700 shadow-2xl">
                            <h2 className="text-2xl font-bold mb-6 flex items-center">
                                <i className="fas fa-scroll mr-3 text-yellow-400"></i>
                                Texto de la Marquesina
                            </h2>
                            <textarea className="w-full px-4 py-4 bg-slate-800 border border-slate-600 rounded-xl focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 outline-none text-white resize-none text-lg" rows="4" value={tickerText} onChange={e => updateTicker(e.target.value)} placeholder="Escribe el texto que se mostrará en la marquesina inferior..."></textarea>
                            <p className="text-sm text-slate-500 mt-2"><i className="fas fa-info-circle mr-1"></i>Este texto se desplazará continuamente en la parte inferior de la pantalla durante el Modo Kiosco.</p>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // START SCREEN
        // ============================================================================
        function StartScreen({ onStartKiosk, onStartAdmin }) {
            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-8">
                    <div className="max-w-4xl w-full text-center fade-in">
                        <div className="mb-12">
                            <div className="w-24 h-24 bg-gradient-to-br from-blue-500 to-purple-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-blue-500/20">
                                <i className="fas fa-school text-white text-5xl"></i>
                            </div>
                            <h1 className="text-6xl font-black text-white mb-4 tracking-tight">Pantallas Escolares</h1>
                            <p className="text-2xl text-blue-300 font-medium">Sistema de Difusión Digital para tu Colegio</p>
                        </div>

                        <div className="grid md:grid-cols-2 gap-8 max-w-3xl mx-auto">
                            <button onClick={onStartKiosk} className="group bg-gradient-to-br from-blue-600 to-blue-800 hover:from-blue-500 hover:to-blue-700 p-10 rounded-3xl shadow-2xl shadow-blue-900/50 transition-all hover:scale-105 hover:shadow-blue-800/50 border border-blue-400/20">
                                <div className="w-20 h-20 bg-white/10 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                                    <i className="fas fa-tv text-white text-4xl"></i>
                                </div>
                                <h2 className="text-3xl font-black text-white mb-3">Iniciar Kiosco</h2>
                                <p className="text-blue-200 text-lg">Presentación automática en pantalla completa para TVs del colegio</p>
                            </button>

                            <button onClick={onStartAdmin} className="group bg-gradient-to-br from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 p-10 rounded-3xl shadow-2xl shadow-slate-900/50 transition-all hover:scale-105 hover:shadow-slate-800/50 border border-slate-500/20">
                                <div className="w-20 h-20 bg-white/10 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                                    <i className="fas fa-cog text-white text-4xl"></i>
                                </div>
                                <h2 className="text-3xl font-black text-white mb-3">Administrar Contenido</h2>
                                <p className="text-slate-300 text-lg">Gestiona diapositivas, mensajes y la marquesina de texto</p>
                            </button>
                        </div>

                        <p className="mt-12 text-slate-600 text-lg">Datos almacenados localmente • Sin conexión a internet requerida</p>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // MAIN APP
        // ============================================================================
        function App() {
            const [view, setView] = useState('start');
            const [slides, setSlides] = useState([]);
            const [tickerText, setTickerText] = useState('');

            // Load initial data
            useEffect(() => {
                setSlides(Storage.get(STORAGE.SLIDES, []));
                setTickerText(Storage.get(STORAGE.TICKER, ''));
            }, []);

            // Save slides when changed
            useEffect(() => {
                if (slides.length > 0 || Storage.get(STORAGE.SLIDES)) {
                    Storage.set(STORAGE.SLIDES, slides);
                }
            }, [slides]);

            // Save ticker when changed
            useEffect(() => {
                if (tickerText || Storage.get(STORAGE.TICKER)) {
                    Storage.set(STORAGE.TICKER, tickerText);
                }
            }, [tickerText]);

            // Handle fullscreen for kiosk
            useEffect(() => {
                if (view === 'kiosk') {
                    document.documentElement.requestFullscreen?.().catch(() => {});
                } else {
                    if (document.fullscreenElement) {
                        document.exitFullscreen?.().catch(() => {});
                    }
                }
            }, [view]);

            return (
                <>
                    {view === 'start' && (
                        <StartScreen 
                            onStartKiosk={() => setView('kiosk')} 
                            onStartAdmin={() => setView('admin')} 
                        />
                    )}
                    {view === 'kiosk' && (
                        <KioskMode 
                            slides={slides} 
                            tickerText={tickerText} 
                            onExit={() => setView('start')} 
                        />
                    )}
                    {view === 'admin' && (
                        <AdminPanel 
                            slides={slides} 
                            setSlides={setSlides} 
                            tickerText={tickerText} 
                            setTickerText={setTickerText} 
                            onBack={() => setView('start')} 
                        />
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
