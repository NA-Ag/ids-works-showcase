<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enfermería Escolar - Control de Visitas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

    <!-- Babel for JSX -->

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

                        }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ============================================================================
        // DATA LAYER - localStorage wrapper
        // NOTA: Esta sección está estructurada para ser reemplazada fácilmente con
        // llamadas a un backend Node.js/Electron usando fs o una base de datos.
        // Solo necesitas cambiar las funciones dentro de 'db' por llamadas a tu API.
        // ============================================================================
        
        const DB_KEYS = {
            STUDENTS: 'enfermeria_students',
            VISITS: 'enfermeria_visits'
        };

        const db = {
            // Helper to safely parse localStorage
            get(key) {
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : null;
                } catch (e) {
                    console.error('Error reading from localStorage:', e);
                    return null;
                }
            },
            
            // Helper to safely write to localStorage
            set(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                } catch (e) {
                    console.error('Error writing to localStorage:', e);
                }
            },

            // Students CRUD
            getStudents() {
                return this.get(DB_KEYS.STUDENTS) || [];
            },
            saveStudents(students) {
                this.set(DB_KEYS.STUDENTS, students);
            },
            addStudent(student) {
                const students = this.getStudents();
                students.push({ ...student, id: Date.now().toString() });
                this.saveStudents(students);
                return student;
            },

            // Visits CRUD
            getVisits() {
                return this.get(DB_KEYS.VISITS) || [];
            },
            saveVisits(visits) {
                this.set(DB_KEYS.VISITS, visits);
            },
            addVisit(visit) {
                const visits = this.getVisits();
                const newVisit = { ...visit, id: Date.now().toString() };
                visits.unshift(newVisit); // Newest first
                this.saveVisits(visits);
                return newVisit;
            },
            getVisitsByStudent(studentId) {
                return this.getVisits().filter(v => v.studentId === studentId);
            },
            getTodayVisits() {
                const today = new Date().toISOString().split('T')[0];
                return this.getVisits().filter(v => v.fechaHora && v.fechaHora.startsWith(today));
            }
        };

        // ============================================================================
        // MOCK DATA - Mexican students with realistic names and conditions
        // ============================================================================
        
        function initializeMockData() {
            if (db.getStudents().length === 0) {
                const mockStudents = [
                    {
                        id: '1',
                        nombre: 'Juan Pérez Hernández',
                        grado: '5° Primaria',
                        grupo: 'A',
                        alergias: ['Penicilina', 'Nueces'],
                        contactoEmergencia: { nombre: 'Rosa Pérez', telefono: '55 1234 5678', relacion: 'Madre' },
                        fechaRegistro: '2024-08-15'
                    },
                    {
                        id: '2',

                        grado: '3° Primaria',
                        grupo: 'B',
                        alergias: [],
                        contactoEmergencia: { nombre: 'Carlos García', telefono: '55 9876 5432', relacion: 'Padre' },
                        fechaRegistro: '2024-08-15'
                    },
                    {
                        id: '3',
                        nombre: 'Sofía Martínez Ruiz',
                        grado: '1° Secundaria',
                        grupo: 'A',
                        alergias: ['Polen', 'Ácaros'],
                        contactoEmergencia: { nombre: 'Ana Ruiz', telefono: '55 4567 8901', relacion: 'Madre' },
                        fechaRegistro: '2024-08-20'
                    },
                    {
                        id: '4',
                        nombre: 'Diego Torres Sánchez',
                        grado: '6° Primaria',
                        grupo: 'A',
                        alergias: ['Ninguna conocida'],
                        contactoEmergencia: { nombre: 'Luis Torres', telefono: '55 3210 9876', relacion: 'Padre' },
                        fechaRegistro: '2024-09-01'
                    },
                    {
                        id: '5',
                        nombre: 'Valentina Rodríguez Cruz',
                        grado: '2° Primaria',
                        grupo: 'C',
                        alergias: ['Sulfas', 'Lactosa'],
                        contactoEmergencia: { nombre: 'Patricia Cruz', telefono: '55 6789 0123', relacion: 'Abuela' },
                        fechaRegistro: '2024-09-05'
                    }
                ];
                db.saveStudents(mockStudents);

                // Add some mock visits for today and previous days
                const today = new Date().toISOString().split('T')[0];
                const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
                const mockVisits = [
                    { id: 'v1', studentId: '1', motivo: 'Dolor de cabeza', tratamiento: 'Reposo', notas: 'Estudiante refiere dolor leve. Se recomienda reposo de 20 minutos.', fechaHora: `${today}T09:30:00`, enfermera: 'Enf. Laura' },
                    { id: 'v2', studentId: '2', motivo: 'Golpe/Caída', tratamiento: 'Curación', notas: 'Rasguño en rodilla derecha. Limpieza con solución fisiológica y aplicación de antiséptico.', fechaHora: `${today}T11:15:00`, enfermera: 'Enf. Laura' },
                    { id: 'v3', studentId: '3', motivo: 'Fiebre', tratamiento: 'Llamada a Padres', notas: 'Temperatura: 38.5°C. Se contactó a la madre para recoger a la estudiante.', fechaHora: `${today}T13:45:00`, enfermera: 'Enf. María' },
                    { id: 'v4', studentId: '1', motivo: 'Dolor de estómago', tratamiento: 'Reposo', notas: 'Dolor abdominal leve. Reposo y observación.', fechaHora: `${yesterday}T10:00:00`, enfermera: 'Enf. Laura' },
                    { id: 'v5', studentId: '5', motivo: 'Dolor de cabeza', tratamiento: 'Medicamento', notas: 'Se administra paracetamol 250mg con autorización materna previa.', fechaHora: `${yesterday}T14:30:00`, enfermera: 'Enf. María' },
                ];
                db.saveVisits(mockVisits);
            }
        }

        // Initialize data on first load
        initializeMockData();

        // ============================================================================
        // UTILITY FUNCTIONS
        // ============================================================================
        
        function formatDate(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
        }

        // ============================================================================
        // REACT COMPONENTS
        // ============================================================================

        const { useState, useEffect, useMemo } = React;

        // --- Badge Component ---
        function AllergyBadge({ alergias }) {
            if (!alergias || alergias.length === 0 || alergias[0] === 'Ninguna conocida') return null;
            return (
                <div className="mt-2">
                    <span className="text-xs font-semibold text-red-600 uppercase tracking-wide">
                        <i className="fas fa-exclamation-triangle mr-1"></i>Alergias:
                    </span>
                    <div className="flex flex-wrap gap-1 mt-1">
                        {alergias.map((a, i) => (
                            <span key={i} className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800 border border-red-200">
                                {a}
                            </span>
                        ))}
                    </div>
                </div>
            );
        }

        // --- Main Dashboard ---
        function Dashboard({ onSelectStudent }) {
            const [search, setSearch] = useState('');
            const [students, setStudents] = useState([]);
            const [visits, setVisits] = useState([]);

            // Load data from localStorage
            useEffect(() => {
                setStudents(db.getStudents());
                setVisits(db.getTodayVisits());
            }, []);

            // Filter students by search
            const filteredStudents = useMemo(() => {
                if (!search.trim()) return [];
                const term = search.toLowerCase();
                return students.filter(s => 
                    s.nombre.toLowerCase().includes(term) || 
                    `${s.grado} ${s.grupo}`.toLowerCase().includes(term)
                );
            }, [search, students]);

            // Get student name by ID
            const getStudentName = (id) => {
                const s = students.find(st => st.id === id);
                return s ? s.nombre : 'Estudiante no encontrado';
            };

            const getStudentDetails = (id) => {
                return students.find(st => st.id === id);
            };

            const handleSelectStudent = (student) => {
                setSearch('');
                onSelectStudent(student);
            };

            return (
                <div className="space-y-6 fade-in">
                    {/* Header */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <div className="flex items-center justify-between mb-6">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-800">Enfermería Escolar</h1>
                                <p className="text-slate-500 mt-1">
                                    <i className="far fa-calendar-alt mr-2"></i>
                                    {new Date().toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                </p>
                            </div>
                            <div className="bg-medical-50 text-medical-700 px-4 py-2 rounded-lg border border-medical-200">
                                <span className="text-sm font-medium">{visits.length} visitas hoy</span>
                            </div>
                        </div>

                        {/* Search Bar */}
                        <div className="relative">
                            <i className="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input 
                                type="text" 
                                placeholder="Buscar estudiante por nombre o grado..." 
                                className="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-medical-500 focus:border-medical-500 outline-none transition-all"
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                            />
                        </div>

                        {/* Search Results Dropdown */}
                        {search && filteredStudents.length > 0 && (
                            <div className="mt-2 bg-white border border-slate-200 rounded-lg shadow-lg max-h-60 overflow-y-auto z-10 relative">
                                {filteredStudents.map(student => (
                                    <button 
                                        key={student.id} 
                                        onClick={() => handleSelectStudent(student)}
                                        className="w-full text-left px-4 py-3 hover:bg-slate-50 border-b border-slate-100 last:border-0 transition-colors flex items-center justify-between"
                                    >
                                        <div>
                                            <p className="font-medium text-slate-800">{student.nombre}</p>
                                            <p className="text-sm text-slate-500">{student.grado} - Grupo {student.grupo}</p>
                                        </div>
                                        {student.alergias.length > 0 && student.alergias[0] !== 'Ninguna conocida' && (
                                            <i className="fas fa-exclamation-circle text-red-500"></i>
                                        )}
                                    </button>
                                ))}
                            </div>
                        )}

                        {search && filteredStudents.length === 0 && (
                            <div className="mt-2 text-center py-8 text-slate-400">
                                <i className="fas fa-user-slash text-3xl mb-2"></i>
                                <p>No se encontraron estudiantes</p>
                            </div>
                        )}
                    </div>

                    {/* Quick Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600">
                                    <i className="fas fa-users"></i>
                                </div>
                                <div>
                                    <p className="text-sm text-slate-500">Total Estudiantes</p>
                                    <p className="text-xl font-bold text-slate-800">{students.length}</p>
                                </div>
                            </div>
                        </div>
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center text-amber-600">
                                    <i className="fas fa-clock"></i>
                                </div>
                                <div>
                                    <p className="text-sm text-slate-500">Visitas Hoy</p>
                                    <p className="text-xl font-bold text-slate-800">{visits.length}</p>
                                </div>
                            </div>
                        </div>
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 bg-red-100 rounded-lg flex items-center justify-center text-red-600">
                                    <i className="fas fa-allergies"></i>
                                </div>
                                <div>
                                    <p className="text-sm text-slate-500">Con Alergias</p>
                                    <p className="text-xl font-bold text-slate-800">
                                        {students.filter(s => s.alergias.length > 0 && s.alergias[0] !== 'Ninguna conocida').length}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Today's Visits */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200">
                        <div className="px-6 py-4 border-b border-slate-200">
                            <h2 className="text-lg font-semibold text-slate-800">
                                <i className="fas fa-clipboard-list mr-2 text-medical-600"></i>
                                Visitas de Hoy
                            </h2>
                        </div>
                        
                        {visits.length === 0 ? (
                            <div className="p-12 text-center text-slate-400">
                                <i className="fas fa-inbox text-4xl mb-3"></i>
                                <p>No hay visitas registradas hoy</p>
                            </div>
                        ) : (
                            <div className="divide-y divide-slate-100">
                                {visits.map(visit => {
                                    const student = getStudentDetails(visit.studentId);
                                    return (
                                        <button 
                                            key={visit.id} 
                                            onClick={() => student && handleSelectStudent(student)}
                                            className="w-full text-left px-6 py-4 hover:bg-slate-50 transition-colors flex items-center justify-between group"
                                        >
                                            <div className="flex items-center space-x-4">
                                                <div className="w-10 h-10 bg-medical-100 rounded-full flex items-center justify-center text-medical-600 font-semibold text-sm">
                                                    {getStudentName(visit.studentId).charAt(0)}
                                                </div>
                                                <div>
                                                    <p className="font-medium text-slate-800 group-hover:text-medical-600 transition-colors">
                                                        {getStudentName(visit.studentId)}
                                                    </p>
                                                    <p className="text-sm text-slate-500">
                                                        {visit.motivo} • {visit.tratamiento}
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-sm font-medium text-slate-600">{formatTime(visit.fechaHora)}</p>
                                                {student && student.alergias.length > 0 && student.alergias[0] !== 'Ninguna conocida' && (
                                                    <span className="text-xs text-red-500 font-medium"><i className="fas fa-exclamation-triangle mr-1"></i>Alergias</span>
                                                )}
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- New Visit Form ---
        function NewVisitForm({ student, onSave, onCancel }) {
            const [form, setForm] = useState({
                motivo: '',
                tratamiento: '',
                notas: ''
            });

            const motivos = ['Dolor de cabeza', 'Dolor de estómago', 'Golpe/Caída', 'Fiebre', 'Náuseas', 'Malestar general', 'Otro'];
            const tratamientos = ['Reposo', 'Medicamento', 'Curación', 'Llamada a Padres', 'Observación', 'Derivación médica'];

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!form.motivo || !form.tratamiento) {
                    alert('Por favor complete el motivo y tratamiento.');
                    return;
                }
                onSave({
                    ...form,
                    studentId: student.id,
                    fechaHora: new Date().toISOString(),
                    enfermera: 'Enf. Laura'
                });
            };

            return (
                <div className="fade-in">
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200">
                        {/* Student Info Header */}
                        <div className="px-6 py-4 border-b border-slate-200 bg-slate-50 rounded-t-xl">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h2 className="text-lg font-semibold text-slate-800">
                                        <i className="fas fa-plus-circle mr-2 text-medical-600"></i>
                                        Registrar Nueva Visita
                                    </h2>
                                    <p className="text-slate-600 mt-1">Estudiante: <span className="font-semibold">{student.nombre}</span> • {student.grado} - Grupo {student.grupo}</p>
                                </div>
                                <button onClick={onCancel} className="text-slate-400 hover:text-slate-600 transition-colors">
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                            </div>
                        </div>

                        {/* Form */}
                        <form onSubmit={handleSubmit} className="p-6 space-y-5">
                            {/* Allergy Warning */}
                            {student.alergias.length > 0 && student.alergias[0] !== 'Ninguna conocida' && (
                                <div className="bg-red-50 border border-red-200 rounded-lg p-4">
                                    <div className="flex items-start">
                                        <i className="fas fa-allergies text-red-500 mt-1 mr-3"></i>
                                        <div>
                                            <p className="font-semibold text-red-800">⚠️ Alerta de Alergias</p>
                                            <p className="text-sm text-red-700 mt-1">
                                                Este estudiante es alérgico a: {student.alergias.join(', ')}
                                            </p>
                                            <p className="text-xs text-red-600 mt-1">Verifique antes de administrar cualquier medicamento.</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Motivo */}
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">
                                    <i className="fas fa-stethoscope mr-1 text-slate-400"></i>Motivo de la visita *
                                </label>
                                <select 
                                    className="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-medical-500 focus:border-medical-500 outline-none bg-white"
                                    value={form.motivo}
                                    onChange={(e) => setForm({...form, motivo: e.target.value})}
                                    required
                                >
                                    <option value="">Seleccionar motivo...</option>
                                    {motivos.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                            </div>

                            {/* Tratamiento */}
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">
                                    <i className="fas fa-pills mr-1 text-slate-400"></i>Tratamiento / Acción *
                                </label>
                                <select 
                                    className="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-medical-500 focus:border-medical-500 outline-none bg-white"
                                    value={form.tratamiento}
                                    onChange={(e) => setForm({...form, tratamiento: e.target.value})}
                                    required
                                >
                                    <option value="">Seleccionar tratamiento...</option>
                                    {tratamientos.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            </div>

                            {/* Notas */}
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">
                                    <i className="fas fa-sticky-note mr-1 text-slate-400"></i>Notas / Observaciones
                                </label>
                                <textarea 
                                    className="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-medical-500 focus:border-medical-500 outline-none resize-none"
                                    rows="4"
                                    placeholder="Describa los síntomas observados, signos vitales si aplica, y cualquier otra observación relevante..."
                                    value={form.notas}
                                    onChange={(e) => setForm({...form, notas: e.target.value})}
                                ></textarea>
                            </div>

                            {/* Actions */}
                            <div className="flex items-center justify-end space-x-3 pt-4 border-t border-slate-100">
                                <button 
                                    type="button"
                                    onClick={onCancel}
                                    className="px-6 py-2.5 border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors font-medium"
                                >
                                    Cancelar
                                </button>
                                <button 
                                    type="submit"
                                    className="px-6 py-2.5 bg-medical-600 text-white rounded-lg hover:bg-medical-700 transition-colors font-medium shadow-sm"
                                >
                                    <i className="fas fa-save mr-2"></i>Guardar Visita
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // --- Visit History ---
        function VisitHistory({ visits, students }) {
            const getStudentName = (id) => {
                const s = students.find(st => st.id === id);
                return s ? s.nombre : 'Desconocido';
            };

            if (visits.length === 0) {
                return (
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-12 text-center text-slate-400">
                        <i className="fas fa-folder-open text-4xl mb-3"></i>
                        <p>No hay visitas registradas aún</p>
                    </div>
                );
            }

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 fade-in">
                    <div className="px-6 py-4 border-b border-slate-200">
                        <h2 className="text-lg font-semibold text-slate-800">
                            <i className="fas fa-history mr-2 text-medical-600"></i>
                            Historial de Visitas
                        </h2>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-slate-50">
                                <tr>
                                    <th className="text-left py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Fecha</th>
                                    <th className="text-left py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Estudiante</th>
                                    <th className="text-left py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Motivo</th>
                                    <th className="text-left py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Tratamiento</th>
                                    <th className="text-left py-3 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Notas</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {visits.map(visit => (
                                    <tr key={visit.id} className="hover:bg-slate-50 transition-colors">
                                        <td className="py-3 px-4 text-sm text-slate-600 whitespace-nowrap">{formatDate(visit.fechaHora)}</td>
                                        <td className="py-3 px-4 text-sm font-medium text-slate-800">{getStudentName(visit.studentId)}</td>
                                        <td className="py-3 px-4 text-sm text-slate-600">
                                            <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-50 text-blue-700 border border-blue-200">
                                                {visit.motivo}
                                            </span>
                                        </td>
                                        <td className="py-3 px-4 text-sm text-slate-600">
                                            <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-50 text-green-700 border border-green-200">
                                                {visit.tratamiento}
                                            </span>
                                        </td>
                                        <td className="py-3 px-4 text-sm text-slate-500 max-w-xs truncate">{visit.notas || '-'}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- Student Profile Modal ---
        function StudentProfile({ student, visits, students, onClose }) {
            const [activeTab, setActiveTab] = useState('profile');
            const [showNewVisit, setShowNewVisit] = useState(false);

            const handleNewVisitSave = (visitData) => {
                db.addVisit(visitData);
                setShowNewVisit(false);
                // Refresh would happen via parent state, but for now we close
                onClose();
            };

            if (showNewVisit) {
                return (
                    <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4 fade-in" onClick={onClose}>
                        <div className="bg-slate-100 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl" onClick={e => e.stopPropagation()}>
                            <NewVisitForm 
                                student={student} 
                                onSave={handleNewVisitSave} 
                                onCancel={() => setShowNewVisit(false)} 
                            />
                        </div>
                    </div>
                );
            }

            const studentVisits = db.getVisitsByStudent(student.id);

            return (
                <div className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4 fade-in" onClick={onClose}>
                    <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl" onClick={e => e.stopPropagation()}>
                        {/* Header */}
                        <div className="bg-gradient-to-r from-medical-600 to-medical-700 px-6 py-5 rounded-t-2xl">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center space-x-4">
                                    <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center text-medical-600 text-2xl font-bold shadow-md">
                                        {student.nombre.charAt(0)}
                                    </div>
                                    <div>
                                        <h2 className="text-xl font-bold text-white">{student.nombre}</h2>
                                        <p className="text-medical-200">{student.grado} - Grupo {student.grupo}</p>
                                    </div>
                                </div>
                                <button onClick={onClose} className="text-white/80 hover:text-white transition-colors">
                                    <i className="fas fa-times text-2xl"></i>
                                </button>
                            </div>
                        </div>

                        {/* Alert Bar for Allergies */}
                        {student.alergias.length > 0 && student.alergias[0] !== 'Ninguna conocida' && (
                            <div className="bg-red-50 border-l-4 border-red-500 px-6 py-3 flex items-center">
                                <i className="fas fa-exclamation-triangle text-red-500 mr-3 text-lg"></i>
                                <div>
                                    <p className="font-semibold text-red-800">ALERGIAS REGISTRADAS</p>
                                    <p className="text-sm text-red-700">{student.alergias.join(', ')}</p>
                                </div>
                            </div>
                        )}

                        {/* Tabs */}
                        <div className="flex border-b border-slate-200">
                            <button 
                                className={`flex-1 py-3 text-sm font-medium text-center transition-colors ${activeTab === 'profile' ? 'text-medical-600 border-b-2 border-medical-600 bg-medical-50' : 'text-slate-500 hover:text-slate-700'}`}
                                onClick={() => setActiveTab('profile')}
                            >
                                <i className="fas fa-user mr-2"></i>Información
                            </button>
                            <button 
                                className={`flex-1 py-3 text-sm font-medium text-center transition-colors ${activeTab === 'history' ? 'text-medical-600 border-b-2 border-medical-600 bg-medical-50' : 'text-slate-500 hover:text-slate-700'}`}
                                onClick={() => setActiveTab('history')}
                            >
                                <i className="fas fa-history mr-2"></i>Historial ({studentVisits.length})
                            </button>
                        </div>

                        {/* Tab Content */}
                        <div className="p-6">
                            {activeTab === 'profile' ? (
                                <div className="space-y-6 fade-in">
                                    {/* Emergency Contact */}
                                    <div className="bg-slate-50 rounded-lg p-4 border border-slate-200">
                                        <h3 className="font-semibold text-slate-700 mb-3">
                                            <i className="fas fa-phone-alt mr-2 text-medical-500"></i>Contacto de Emergencia
                                        </h3>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div>
                                                <p className="text-xs text-slate-500 uppercase">Nombre</p>
                                                <p className="font-medium text-slate-800">{student.contactoEmergencia.nombre}</p>
                                            </div>
                                            <div>
                                                <p className="text-xs text-slate-500 uppercase">Relación</p>
                                                <p className="font-medium text-slate-800">{student.contactoEmergencia.relacion}</p>
                                            </div>
                                            <div>
                                                <p className="text-xs text-slate-500 uppercase">Teléfono</p>
                                                <p className="font-medium text-medical-600">{student.contactoEmergencia.telefono}</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Quick Stats */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-blue-50 rounded-lg p-4 border border-blue-100">
                                            <p className="text-sm text-blue-600">Total de Visitas</p>
                                            <p className="text-2xl font-bold text-blue-800">{studentVisits.length}</p>
                                        </div>
                                        <div className="bg-amber-50 rounded-lg p-4 border border-amber-100">
                                            <p className="text-sm text-amber-600">Última Visita</p>
                                            <p className="text-lg font-bold text-amber-800">
                                                {studentVisits.length > 0 ? formatDate(studentVisits[0].fechaHora).split(' de ')[0] : 'N/A'}
                                            </p>
                                        </div>
                                    </div>

                                    {/* Action Button */}
                                    <button 
                                        onClick={() => setShowNewVisit(true)}
                                        className="w-full py-3 bg-medical-600 text-white rounded-lg hover:bg-medical-700 transition-colors font-semibold shadow-sm"
                                    >
                                        <i className="fas fa-plus-circle mr-2"></i>Registrar Nueva Visita
                                    </button>
                                </div>
                            ) : (
                                <div className="fade-in">
                                    {studentVisits.length === 0 ? (
                                        <p className="text-center text-slate-400 py-8">No hay visitas registradas para este estudiante.</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {studentVisits.map(visit => (
                                                <div key={visit.id} className="bg-slate-50 rounded-lg p-4 border border-slate-200">
                                                    <div className="flex items-start justify-between mb-2">
                                                        <div className="flex items-center space-x-2">
                                                            <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800">
                                                                {visit.motivo}
                                                            </span>
                                                            <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800">
                                                                {visit.tratamiento}
                                                            </span>
                                                        </div>
                                                        <span className="text-xs text-slate-400">{formatDate(visit.fechaHora)}</span>
                                                    </div>
                                                    {visit.notas && (
                                                        <p className="text-sm text-slate-600 mt-2 bg-white p-2 rounded border border-slate-100">
                                                            <i className="fas fa-comment-medical mr-1 text-slate-400"></i>
                                                            {visit.notas}
                                                        </p>
                                                    )}
                                                    <p className="text-xs text-slate-400 mt-2 text-right">Atendido por: {visit.enfermera}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // MAIN APP COMPONENT
        // ============================================================================

        function App() {
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [students, setStudents] = useState(db.getStudents());
            const [allVisits, setAllVisits] = useState(db.getVisits());

            // Refresh data periodically
            useEffect(() => {
                const interval = setInterval(() => {
                    setStudents(db.getStudents());
                    setAllVisits(db.getVisits());
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="min-h-screen">
                    {/* Top Navigation Bar */}
                    <nav className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex items-center justify-between h-16">
                                <div className="flex items-center space-x-3">
                                    <div className="w-10 h-10 bg-medical-600 rounded-lg flex items-center justify-center">
                                        <i className="fas fa-user-nurse text-white text-lg"></i>
                                    </div>
                                    <div>
                                        <h1 className="text-lg font-bold text-slate-800">Enfermería Escolar</h1>
                                        <p className="text-xs text-slate-500">Sistema de Control de Visitas</p>
                                    </div>
                                </div>
                                <div className="flex items-center space-x-4">
                                    <div className="text-right hidden sm:block">
                                        <p className="text-sm font-medium text-slate-700">{new Date().toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</p>
                                    </div>
                                    <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600">
                                        <i className="fas fa-user-md"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <Dashboard onSelectStudent={setSelectedStudent} />
                        
                        {/* Full History Section */}
                        <div className="mt-8">
                            <VisitHistory visits={allVisits} students={students} />
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t border-slate-200 mt-12 py-6">
                        <div className="max-w-7xl mx-auto px-4 text-center text-slate-400 text-sm">
                            <p>Enfermería Escolar v1.0 • Sistema de Control de Visitas Médicas</p>
                            <p className="mt-1">Datos almacenados localmente • Desarrollado para escuelas privadas en México</p>
                        </div>
                    </footer>

                    {/* Student Profile Modal */}
                    {selectedStudent && (
                        <StudentProfile 
                            student={selectedStudent} 
                            visits={db.getVisitsByStudent(selectedStudent.id)}
                            students={students}
                            onClose={() => setSelectedStudent(null)} 
                        />
                    )}
                </div>
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
